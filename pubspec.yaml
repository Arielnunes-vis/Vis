name: vis
description: "VIS — Plataforma inteligente para acompanhamento de evolução física."
publish_to: "none"

# A versão do app segue o padrão SemVer + build number.
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # ----- Gerenciamento de estado / DI -----
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ----- Navegação -----
  go_router: ^14.2.0

  # ----- Backend / Supabase -----
  supabase_flutter: ^2.5.6

  # ----- Configuração de ambiente -----
  flutter_dotenv: ^5.1.0

  # ----- Armazenamento -----
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2

  # ----- Conectividade -----
  connectivity_plus: ^6.0.3
  internet_connection_checker_plus: ^2.5.1

  # ----- UI / Design System -----
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.1
  lucide_icons: ^0.257.0

  # ----- Notificações -----
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4

  # ----- Mídia -----
  image_picker: ^1.1.2

  # ----- Utilitários -----
  uuid: ^4.4.0
  logger: ^2.3.0
  intl: ^0.19.0
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  flutter_lints: ^4.0.0

  # Geração de código (Riverpod / Hive) — habilitar quando necessário.
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true

  # Variáveis de ambiente carregadas em runtime (flutter_dotenv).
  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/gifs/

  # A tipografia Inter é carregada via google_fonts em runtime,
  # portanto não é necessário declarar arquivos de fonte aqui.
